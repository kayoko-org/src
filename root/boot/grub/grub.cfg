set default=0
set timeout=5

# AIX-style menu entry
menuentry "Boot Xai 7.3" {
insmod iso9660
insmod part_msdos
insmod ext2

   set root=(cd)
   linux /boot/vmlinuz root=/dev/sr0 rw console=tty0
   # initrd /boot/initramfs.cpio.gz # Uncomment if using initrd
}

menuentry "Boot Xai 7.3 (Single User Mode)" {
    search --set=root --file /boot/vmlinuz
    linux /boot/vmlinuz root=/dev/sda1 rw console=tty0 single
}
